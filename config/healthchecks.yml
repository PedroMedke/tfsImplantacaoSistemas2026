healthchecks:
  web-frontend:
    type: http
    url: http://dashboard:80/health
    interval: 30s
    timeout: 10s
    retries: 3
    expected_status: 200
    expected_body: "Dashboard OK"

  api-backend:
    type: http
    url: http://api:5000/health/status
    interval: 15s
    timeout: 5s
    retries: 2
    expected_status: 200
    headers:
      Authorization: "Bearer health-token"

  database:
    type: database
    connection: "mysql+pymysql://user:pass@db:3306/app"
    query: "SELECT 1"
    interval: 60s
    timeout: 30s
    retries: 5

  redis-cache:
    type: tcp
    host: redis
    port: 6379
    interval: 30s
    timeout: 5s
    retries: 3
