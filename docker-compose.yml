version: '3.8'

services:
  api:
    build: ./api
    ports:
      - 5000:5000
    environment:
      - APP_ENV=production
      - DATABASE_URL=mysql+pymysql://user:pass@db:3306/app
    depends_on:
      - db
      - redis
    volumes:
      - ./api:/app

  dashboard:
    build: ./dashboard
    ports:
      - 3000:80
    depends_on:
      - api

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: app
      MYSQL_USER: user
      MYSQL_PASSWORD: pass
    ports:
      - 3306:3306
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:alpine
    ports:
      - 6379:6379

volumes:
  db_data:
